<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>3D Mahjong Quest</title>
  <link rel="stylesheet" href="styles.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
  <!-- Main Game UI -->
  <div id="game-container">
    <div id="hud">
      <div class="hud-item" id="level-display">Level 1</div>
      <div class="hud-item" id="score-container">⭐ <span id="score-value">0</span></div>
      <div class="hud-item" id="timer-container">⏳ <span id="time-value">120</span>s</div>
      <button id="menu-btn" class="hud-btn">☰</button>
    </div>

    <div id="board-container">
      <div id="board"></div>
    </div>

    <!-- Mobile Controls -->
    <div id="mobile-controls">
      <div class="rotate-pad">
        <button class="control-btn" data-action="up">⬆️</button>
        <div class="row">
          <button class="control-btn" data-action="left">⬅️</button>
          <button class="control-btn" data-action="reset">⏺️</button>
          <button class="control-btn" data-action="right">➡️</button>
        </div>
        <button class="control-btn" data-action="down">⬇️</button>
      </div>
    </div>
  </div>

  <!-- Screens / Modals -->
  <div id="main-menu" class="screen active">
    <h1>🀄 Mahjong Quest 🀄</h1>
    <div class="menu-content">
      <button id="play-btn" class="primary-btn">Play</button>
      <button id="levels-btn" class="secondary-btn">Select Level</button>
      <button id="themes-btn" class="secondary-btn">Customize Theme</button>
    </div>
  </div>

  <div id="level-select" class="screen">
    <h2>Select Level</h2>
    <div id="levels-grid" class="grid-menu"></div>
    <button class="back-btn secondary-btn">Back</button>
  </div>

  <div id="theme-select" class="screen">
    <h2>Select Theme</h2>
    <div id="themes-grid" class="grid-menu"></div>
    <button class="back-btn secondary-btn">Back</button>
  </div>

  <div id="game-over" class="screen">
    <h2 id="game-over-title">Level Complete!</h2>
    <p id="game-over-msg">Score: 1200</p>
    <div class="menu-content">
      <button id="next-level-btn" class="primary-btn">Next Level</button>
      <button id="retry-btn" class="secondary-btn">Retry</button>
      <button id="home-btn" class="secondary-btn">Main Menu</button>
    </div>
  </div>

  <script type="module" src="game.js"></script>

</body>
</html>
